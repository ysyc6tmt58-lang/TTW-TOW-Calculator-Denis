<!DOCTYPE html>
<html lang="sl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TTW & TOW Calculator Denis</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#d60000">

</head>

<body>

<div class="container">

<header>

<img src="IMG_0669.jpeg" class="logo">

<h1>TTW & TOW Calculator</h1>

<p>Denis</p>

</header>

<section class="card">

<h2>⏱ Čas</h2>

<label>Čas za 1 paleto (sek)</label>

<input
id="cas"
type="number"
placeholder="30.25">

<div id="casRezultat"></div>

</section>

<section class="card">

<h2>🚛 TOW Kalkulator</h2>

<label>TTW vozički</label>

<input
id="ttw"
type="number"
placeholder="140">

<label>Palet na TTW</label>

<input
id="palet"
type="number"
value="9">

<label>Cigel na paleti</label>

<input
id="cigel"
type="number"
value="12">

<label>Cigel na enem TOW</label>

<input
id="tow"
type="number"
value="360">

<div id="rezultat"></div>

</section>

<script src="script.js"></script>

</div>

</body>

</html>
