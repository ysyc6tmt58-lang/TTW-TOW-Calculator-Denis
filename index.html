<!DOCTYPE html>
<html lang="sl">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TTW & TOW Calculator Denis</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#d60000">

</head>

<body>

<div class="container">

<header>

<img src="logo.png" class="logo">

<h1>TTW & TOW Calculator</h1>

<p>Denis</p>

</header>

<nav>

<button class="active">⏱ ČAS</button>

<button>🚛 TOW</button>

<button>⚙ Nastavitve</button>

</nav>

<main>

<div class="card">

<h2>Čas za eno paleto</h2>

<input
id="cas"
type="number"
placeholder="30.25">

</div>

<div class="card">

<h2>TOW Kalkulator</h2>

<input
id="ttw"
type="number"
placeholder="TTW">

<input
id="palete"
type="number"
value="9">

<input
id="cigel"
type="number"
value="12">

<input
id="tow"
type="number"
value="360">

</div>

<div id="results">

</div>

</main>

</div>

<script src="script.js"></script>

</body>

</html>
